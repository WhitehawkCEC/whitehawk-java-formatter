name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # Installs the JDK pinned in mise.toml and exports JAVA_HOME.
      - uses: jdx/mise-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Verify
        if: github.event_name == 'pull_request'
        run: ./mvnw --batch-mode source:jar verify

      # Credentials come from .mvn/settings.xml (server id `github`,
      # resolved from ${env.GITHUB_ACTOR}/${env.GITHUB_TOKEN}).
      - name: Deploy to GitHub Packages
        if: github.event_name == 'push'
        run: ./mvnw --batch-mode source:jar deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  native-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      # Tests already run in the build job.
      - name: Build native image
        run: ./mvnw --batch-mode -Pnative -DskipTests -pl app-cli -am package

      - uses: actions/upload-artifact@v7
        with:
          name: wh-java-formatter-linux-amd64
          path: app-cli/target/wh-java-formatter
          if-no-files-found: error
